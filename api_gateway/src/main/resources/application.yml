spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: identity-service
              uri: lb://IDENTITY-SERVICE
              predicates:
                - Path=/auth/**

            # Route for standard HTTP REST API (history, edit, delete)
            - id: chat-service-rest
              uri: lb://CHAT-SERVICE
              predicates:
                - Path=/api/chat/**

            # Explicit route for WebSocket traffic
            - id: chat-service-websocket
              uri: lb://CHAT-SERVICE   # Notice the 'ws' here. This tells the gateway to upgrade the connection.
              predicates:
                - Path=/ws-chat/**

server:
  port: 8080

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/